<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FUTBALI - FINAL FIX</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; overflow: hidden; touch-action: none; }
        .screen { display: none; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .menu-btn { padding: 20px; margin: 10px; font-size: 18px; width: 280px; cursor: pointer; border: none; border-radius: 10px; background: #48abe0; color: white; font-weight: bold; }
        .menu-btn:disabled { background: #555; opacity: 0.5; }
        input { padding: 15px; margin-bottom: 20px; width: 240px; border-radius: 8px; border: none; font-size: 18px; text-align: center; }
        canvas { background: #0f3460; border: 4px solid #fff; display: none; }
        #status-msg { margin-top: 10px; font-size: 14px; color: #ff4d4d; }
    </style>
</head>
<body>

<div id="menu-container">
    <div id="role-screen" class="screen active">
        <h1>FUTBALI ONLINE</h1>
        <button class="menu-btn" id="btn-p1" onclick="selectRole('p1')">PLAYER 1 (ლურჯი)</button>
        <button class="menu-btn" id="btn-p2" onclick="selectRole('p2')">PLAYER 2 (წითელი)</button>
        <p id="status-msg"></p>
    </div>

    <div id="name-screen" class="screen">
        <h1>შეიყვანე სახელი</h1>
        <input type="text" id="username" placeholder="სახელი..." maxlength="10">
        <button class="menu-btn" onclick="joinGame()">თამაშის დაწყება</button>
    </div>

    <div id="wait-screen" class="screen">
        <h1>ველოდებით მეტოქეს...</h1>
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #48abe0; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
    </div>
</div>

<canvas id="game-canvas"></canvas>

<script>
    // 1. შენი ზუსტი კონფიგურაცია
    const firebaseConfig = {
        apiKey: "AIzaSyB_P95yT05HIW83CpwZx4WMWWP_vPB3S4s",
        authDomain: "futbali.firebaseapp.com",
        projectId: "futbali",
        databaseURL: "https://futbali-default-rtdb.europe-west1.firebasedatabase.app/",
        storageBucket: "futbali.firebasestorage.app",
        messagingSenderId: "380333518099",
        appId: "1:380333518099:web:ba452f377d46239e03bee6"
    };

    // 2. ინიციალიზაცია
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const matchRef = db.ref('live_match');

    let role = null;
    let myName = "";

    // 3. შემოწმება: უკავშირდება თუ არა საერთოდ ბაზას?
    db.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true) {
            document.getElementById('status-msg').innerText = "✅ ბაზასთან კავშირი დამყარებულია";
            document.getElementById('status-msg').style.color = "#2ecc71";
        } else {
            document.getElementById('status-msg').innerText = "❌ კავშირი არ არის (შეამოწმე ინტერნეტი ან Rules)";
            document.getElementById('status-msg').style.color = "#ff4d4d";
        }
    });

    // 4. Presence - ღილაკების დაბლოკვა
    matchRef.child('presence').on('value', (snap) => {
        const d = snap.val() || {};
        document.getElementById('btn-p1').disabled = !!d.p1;
        document.getElementById('btn-p2').disabled = !!d.p2;
        
        // თუ ორივე შევიდა, ვიწყებთ
        if (d.p1 && d.p2 && role) {
            alert("ორივე მოთამაშე მზად არის! თამაში იწყება.");
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-canvas').style.display = 'block';
        }
    });

    function selectRole(r) {
        role = r;
        document.getElementById('role-screen').classList.remove('active');
        document.getElementById('name-screen').classList.add('active');
    }

    function joinGame() {
        myName = document.getElementById('username').value || role;
        
        // მონაცემების ჩაწერა (ეს ნაწილი თუ არ მუშაობს, Rules-ის ბრალია)
        matchRef.child('presence').child(role).set(true)
            .then(() => {
                document.getElementById('name-screen').classList.remove('active');
                document.getElementById('wait-screen').classList.add('active');
            })
            .catch((err) => {
                alert("შეცდომა ჩაწერისას: " + err.message);
            });

        matchRef.child('presence').child(role).onDisconnect().remove();
    }
</script>

<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
